unbind C-b
set -g prefix C-Space
bind C-Space send-prefix

set -g default-terminal "tmux-256color"
set -as terminal-features ",tmux-256color:RGB,xterm-256color:RGB,screen-256color:RGB"
set -g mouse on
set -g focus-events on
set -g history-limit 100000
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on
setw -g mode-keys vi
set -sg escape-time 0

# Keep TPM and theme assets under XDG config so this matches the rest of the dotfiles layout.
set-environment -g TMUX_PLUGIN_MANAGER_PATH "/Users/dom/.config/tmux/plugins/"
set-environment -g PATH "/opt/homebrew/bin:/opt/homebrew/sbin:/usr/local/bin:/usr/local/sbin:/usr/bin:/bin:/usr/sbin:/sbin"

# One Dark palette shared with the shell prompt.
set -g @onedark_bg "#282c34"
set -g @onedark_bg_alt "#21252b"
set -g @onedark_fg "#abb2bf"
set -g @onedark_muted "#5c6370"
set -g @onedark_green "#98c379"
set -g @onedark_green_dark "#7A9C61"
set -g @onedark_yellow "#e5c07b"
set -g @onedark_orange "#d19a66"
set -g @onedark_blue "#51afef"
set -g @onedark_blue_dark "#3896d6"
set -g @onedark_red "#ff7b7a"
set -g @onedark_red_dark "#ff6c6b"
set -g @onedark_purple "#a9a1e1"
set -g @onedark_purple_dark "#9088c8"

set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'catppuccin/tmux'
set -g @plugin 'tmux-plugins/tmux-battery'
set -g @plugin 'tmux-plugins/tmux-cpu'
set -g @plugin 'mrjones2014/smart-splits.nvim'

# Catppuccin provides the base theming hooks; the status line below remaps it to One Dark.
set -g @catppuccin_flavor "mocha"
set -g @catppuccin_status_background "none"
set -g @catppuccin_window_status_style "rounded"

# Match Neovim smart-splits with the existing tmux muscle memory.
set -g @smart-splits_no_wrap "1"
set -g @smart-splits_resize_step_size "3"
set -g @smart-splits_move_left_key "M-h"
set -g @smart-splits_move_down_key "M-j"
set -g @smart-splits_move_up_key "M-k"
set -g @smart-splits_move_right_key "M-l"
set -g @smart-splits_resize_left_key "M-H"
set -g @smart-splits_resize_down_key "M-J"
set -g @smart-splits_resize_up_key "M-K"
set -g @smart-splits_resize_right_key "M-L"

# Load TPM-managed plugins before custom status/window overrides so One Dark stays in control.
if-shell "[ -f /Users/dom/.config/tmux/plugins/tpm/tpm ]" "run /Users/dom/.config/tmux/plugins/tpm/tpm"

bind r source-file ~/.config/tmux/tmux.conf \; display-message "tmux reloaded"
bind c new-window -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
bind \\ split-window -h -c "#{pane_current_path}"

# Preserve the current pane navigation even before TPM installs plugins.
bind-key -n M-h if -F "#{@pane-is-vim}" "send-keys M-h" "select-pane -L"
bind-key -n M-j if -F "#{@pane-is-vim}" "send-keys M-j" "select-pane -D"
bind-key -n M-k if -F "#{@pane-is-vim}" "send-keys M-k" "select-pane -U"
bind-key -n M-l if -F "#{@pane-is-vim}" "send-keys M-l" "select-pane -R"
bind-key -n M-o if -F "#{@pane-is-vim}" "send-keys M-o" "select-pane -l"
bind-key -n M-H if -F "#{@pane-is-vim}" "send-keys M-H" "resize-pane -L 3"
bind-key -n M-J if -F "#{@pane-is-vim}" "send-keys M-J" "resize-pane -D 3"
bind-key -n M-K if -F "#{@pane-is-vim}" "send-keys M-K" "resize-pane -U 3"
bind-key -n M-L if -F "#{@pane-is-vim}" "send-keys M-L" "resize-pane -R 3"
bind-key -T copy-mode-vi M-h select-pane -L
bind-key -T copy-mode-vi M-j select-pane -D
bind-key -T copy-mode-vi M-k select-pane -U
bind-key -T copy-mode-vi M-l select-pane -R
bind-key -T copy-mode-vi M-o select-pane -l

set -g status on
set -g status-position bottom
set -g status-interval 5
set -g status-justify left
set -g status-left-length 40
set -g status-right-length 120
set -gF status-style "bg=default,fg=#{@onedark_fg}"
set -gF message-style "fg=#{@onedark_bg},bg=#{@onedark_blue}"
set -gF message-command-style "fg=#{@onedark_bg},bg=#{@onedark_green}"
set -gF mode-style "fg=#{@onedark_bg},bg=#{@onedark_yellow}"
set -gF display-panes-colour "#{@onedark_blue}"
set -gF display-panes-active-colour "#{@onedark_green}"
set -gF clock-mode-colour "#{@onedark_blue}"
setw -gF pane-border-style "fg=#{@onedark_muted}"
setw -gF pane-active-border-style "fg=#{@onedark_blue}"

set -g status-left " #[fg=#{@onedark_green_dark},bg=default]#[fg=#{@onedark_bg},bg=#{@onedark_green_dark}]  #[fg=#{@onedark_green_dark},bg=#{@onedark_green}]#[fg=#{@onedark_bg},bg=#{@onedark_green}] #S #[fg=#{@onedark_green},bg=default] "

set -g status-right "#[fg=#{@onedark_purple_dark},bg=default]#[fg=#{@onedark_bg},bg=#{@onedark_purple_dark}] 󰆍 #[fg=#{@onedark_purple_dark},bg=#{@onedark_purple}]#[fg=#{@onedark_bg},bg=#{@onedark_purple}] #{pane_current_command} #[fg=#{@onedark_purple},bg=default] "
set -ag status-right " #[fg=#{@onedark_orange},bg=default]#[fg=#{@onedark_bg},bg=#{@onedark_orange}] 󰘚 #[fg=#{@onedark_orange},bg=#{@onedark_yellow}]#[fg=#{@onedark_bg},bg=#{@onedark_yellow}] #(/usr/bin/env PATH=/opt/homebrew/bin:/opt/homebrew/sbin:/usr/local/bin:/usr/local/sbin:/usr/bin:/bin:/usr/sbin:/sbin /Users/dom/.config/tmux/plugins/tmux-cpu/scripts/cpu_percentage.sh 2>/dev/null) #[fg=#{@onedark_yellow},bg=default] "
set -ag status-right " #[fg=#{@onedark_red_dark},bg=default]#[fg=#{@onedark_bg},bg=#{@onedark_red_dark}] #(/usr/bin/env PATH=/opt/homebrew/bin:/opt/homebrew/sbin:/usr/local/bin:/usr/local/sbin:/usr/bin:/bin:/usr/sbin:/sbin /Users/dom/.config/tmux/plugins/tmux-battery/scripts/battery_icon.sh 2>/dev/null) #[fg=#{@onedark_red_dark},bg=#{@onedark_red}]#[fg=#{@onedark_bg},bg=#{@onedark_red}] #(/usr/bin/env PATH=/opt/homebrew/bin:/opt/homebrew/sbin:/usr/local/bin:/usr/local/sbin:/usr/bin:/bin:/usr/sbin:/sbin /Users/dom/.config/tmux/plugins/tmux-battery/scripts/battery_percentage.sh 2>/dev/null) #[fg=#{@onedark_red},bg=default] "
set -ag status-right " #[fg=#{@onedark_blue_dark},bg=default]#[fg=#{@onedark_bg},bg=#{@onedark_blue_dark}]  #[fg=#{@onedark_blue_dark},bg=#{@onedark_blue}]#[fg=#{@onedark_bg},bg=#{@onedark_blue}] %H:%M #[fg=#{@onedark_blue},bg=default]"

setw -g window-status-separator ""
setw -g window-status-format " #[fg=#{@onedark_muted},bg=default]#[fg=#{@onedark_bg},bg=#{@onedark_bg_alt}] #I #[fg=#{@onedark_bg_alt},bg=#{@onedark_muted}]#[fg=#{@onedark_fg},bg=#{@onedark_muted}] #W #[fg=#{@onedark_muted},bg=default] "
setw -g window-status-current-format " #[fg=#{@onedark_green_dark},bg=default]#[fg=#{@onedark_bg},bg=#{@onedark_green_dark}] #I #[fg=#{@onedark_green_dark},bg=#{@onedark_green}]#[fg=#{@onedark_bg},bg=#{@onedark_green}] #W#{?window_zoomed_flag, 󰁌,} #[fg=#{@onedark_green},bg=default] "
